version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    development-dependencies:
      dependency-type: "development"
  cooldown:
    default-days: 10
- package-ecosystem: github-actions
  directory: "/"
  groups:
    github-actions:
      patterns:
        - "*"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  cooldown:
    default-days: 10
